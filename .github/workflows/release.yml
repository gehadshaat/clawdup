# Bumps the package version, creates a git tag, publishes a GitHub release,
# and publishes the package to NPM.
#
# Prerequisites:
#   1. Create an NPM access token (Automation type recommended)
#   2. Add it as a repository secret named NPM_TOKEN
#
# Usage:
#   Go to Actions → "Release" → "Run workflow" and select the version bump type.

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release and publish to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version "${{ inputs.bump }}" --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      - name: Commit and tag
        run: |
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: release ${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push origin "${{ steps.bump.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.version }}" \
            --title "${{ steps.bump.outputs.version }}" \
            --generate-notes

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: CLI smoke test
        run: node dist/cli.js --help

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
